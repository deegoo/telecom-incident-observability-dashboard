services:
  db:
    image: postgres:15
    container_name: observability_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1406
      POSTGRES_DB: telecom

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: observability_api
    restart: unless-stopped

    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips="*"

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 1406
      DB_NAME: telecom

    volumes:
      - .:/app

volumes:
  db_data: