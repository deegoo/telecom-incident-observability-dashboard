services:

  db:
    image: postgres:15
    container_name: observability_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telecom

    ports:
      - "5432:5432"

    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql


  api:
    build: .
    container_name: observability_api

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: telecom

    volumes:
      - .:/app


  frontend:
    image: python:3.11-slim
    container_name: observability_frontend

    working_dir: /app/frontend

    volumes:
      - .:/app

    command: python -m http.server 5500

    ports:
      - "5500:5500"